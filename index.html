<!DOCTYPE html>
<html>
<head>
  <title>Oops I Moved</title>
</head>
<body>

<canvas id="game" width="500" height="500" style="border:1px solid black;"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const TILE_SIZE = 25;

let state = {
  player: { x: 5, y: 5 },
  map: []
};

function generateMap() {
  for (let y = 0; y < 20; y++) {
    state.map[y] = [];
    for (let x = 0; x < 20; x++) {
      state.map[y][x] = Math.random() > 0.2 ? 0 : 1;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < state.map.length; y++) {
    for (let x = 0; x < state.map[y].length; x++) {
      if (state.map[y][x] === 1) {
        ctx.fillStyle = "black";
      } else {
        ctx.fillStyle = "lightgreen";
      }
      ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
    }
  }

  ctx.fillStyle = "red";
  ctx.fillRect(
    state.player.x * TILE_SIZE,
    state.player.y * TILE_SIZE,
    TILE_SIZE,
    TILE_SIZE
  );
}

function move(dx, dy) {
  let newX = state.player.x + dx;
  let newY = state.player.y + dy;

  if (
    newX >= 0 &&
    newY >= 0 &&
    newY < state.map.length &&
    newX < state.map[0].length &&
    state.map[newY][newX] === 0
  ) {
    state.player.x = newX;
    state.player.y = newY;

    sendMove(dx, dy);
  }
}

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp") move(0, -1);
  if (e.key === "ArrowDown") move(0, 1);
  if (e.key === "ArrowLeft") move(-1, 0);
  if (e.key === "ArrowRight") move(1, 0);
});

let socket;

function connect() {
  try {
    socket = new WebSocket("ws://localhost:3000");

    socket.onopen = () => {
      console.log("Connected");
      socket.send(JSON.stringify({ type: "join" }));
    };

    socket.onmessage = (msg) => {
      let data = JSON.parse(msg.data);
      
      if (data.type === "state") {
        state = data.state;
      }
    };

  } catch (e) {
    console.log("No server, using local map");
  }
}

function sendMove(dx, dy) {
  if (socket && socket.readyState === 1) {
    socket.send(JSON.stringify({
      type: "move",
      dx,
      dy
    }));
  }
}

generateMap();
connect();

setInterval(draw, 100);

</script>

</body>
</html>
